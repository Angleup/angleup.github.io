<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
            text-align: center;
        }

        header {
            background-color: #111;
            color: white;
            padding: 40px 20px;
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
        }

        p {
            font-size: 1.2em;
            color: #333;
        }

        .container {
            padding: 40px 20px;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 25px;
            font-size: 18px;
            color: white;
            background-color: #0071e3;
            text-decoration: none;
            border-radius: 8px;
        }

        .button:hover {
            background-color: #005bb5;
        }
    </style>
</head>

<body>

    <header>
        <h1>Meine App</h1>
        <p>Die beste App für XYZ 🚀</p>
    </header>

    <div class="container">
        <p>
            Diese App hilft dir dabei, XYZ schneller und einfacher zu erledigen.
        </p>

        <a class="button" href="https://apps.apple.com/DEIN-LINK">
            Jetzt im App Store laden
        </a>
    </div>

</body>
</html>
